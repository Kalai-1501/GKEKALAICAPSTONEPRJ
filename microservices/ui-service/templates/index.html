<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECommerce Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .cart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .cart-btn:hover {
            background: #764ba2;
        }

        .cart-count {
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            font-size: 12px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .products-section, .cart-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .product-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .product-card .price {
            color: #f44336;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-card button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }

        .product-card button:hover {
            background: #764ba2;
        }

        .product-card button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-info h4 {
            color: #333;
            font-size: 14px;
        }

        .item-price {
            color: #f44336;
            font-weight: bold;
            margin-right: 10px;
        }

        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: #d32f2f;
        }

        .cart-summary {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-row.total {
            border-top: 2px solid #ddd;
            padding-top: 10px;
            font-weight: bold;
            font-size: 16px;
            color: #667eea;
        }

        .checkout-btn {
            width: 100%;
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .checkout-btn:hover:not(:disabled) {
            background: #45a049;
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            text-align: center;
            max-width: 400px;
        }

        .success-modal.show {
            display: block;
        }

        .success-modal h2 {
            color: #4caf50;
            margin-bottom: 15px;
        }

        .success-modal p {
            color: #666;
            margin-bottom: 10px;
        }

        .success-modal .close-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .modal-overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ ECommerce Store</h1>
            <button class="cart-btn" onclick="toggleCart()">
                🛒 Cart
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </header>

        <div class="main-content">
            <div class="products-section">
                <h2>Available Products</h2>
                <div id="alert"></div>
                <div id="productsContainer" class="product-grid">
                    <div class="loading">Loading products...</div>
                </div>
            </div>

            <div class="cart-section">
                <h2>Shopping Cart</h2>
                <div id="cartAlert"></div>
                <div id="cartContainer">
                    <div class="empty-message">Your cart is empty</div>
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (10%):</span>
                        <span id="tax">₹0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                </div>
                <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="success-modal" id="successModal">
        <h2>✅ Order Placed Successfully!</h2>
        <p id="orderId"></p>
        <p id="orderAmount"></p>
        <button class="close-btn" onclick="closeSuccessModal()">Continue Shopping</button>
    </div>

    <script>
        let cart = [];

        // Fetch products on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            loadCart();
        });

        function loadProducts() {
            fetch('/api/products')
                .then(response => response.json())
                .then(products => {
                    const container = document.getElementById('productsContainer');
                    container.innerHTML = '';
                    
                    if (Array.isArray(products) && products.length > 0) {
                        products.forEach(product => {
                            const card = document.createElement('div');
                            card.className = 'product-card';
                            card.innerHTML = `
                                <h3>${product.name}</h3>
                                <div class="price">₹${product.price}</div>
                                <button onclick="addToCart(${product.id})">Add to Cart</button>
                            `;
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = '<div class="empty-message">No products available</div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading products:', error);
                    document.getElementById('productsContainer').innerHTML = 
                        '<div class="empty-message">Error loading products</div>';
                    showAlert('Error loading products. Please try again.', 'error');
                });
        }

        function addToCart(productId) {
            fetch('/api/cart', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ product_id: productId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.product) {
                    showAlert(`Added ${data.product.name} to cart!`, 'success');
                    loadCart();
                } else {
                    showAlert(data.error || 'Failed to add to cart', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Error adding to cart', 'error');
            });
        }

        function loadCart() {
            fetch('/api/cart')
                .then(response => response.json())
                .then(items => {
                    cart = Array.isArray(items) ? items : [];
                    updateCartDisplay();
                })
                .catch(error => {
                    console.error('Error loading cart:', error);
                    cart = [];
                    updateCartDisplay();
                });
        }

        function updateCartDisplay() {
            const cartContainer = document.getElementById('cartContainer');
            const cartCount = document.getElementById('cartCount');
            
            cartCount.textContent = cart.length;
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="empty-message">Your cart is empty</div>';
                document.getElementById('subtotal').textContent = '₹0';
                document.getElementById('tax').textContent = '₹0';
                document.getElementById('total').textContent = '₹0';
                document.getElementById('checkoutBtn').disabled = true;
            } else {
                let html = '';
                let subtotal = 0;
                
                cart.forEach((item, index) => {
                    const price = item.price || 0;
                    subtotal += price;
                    html += `
                        <div class="cart-item">
                            <div class="item-info">
                                <h4>${item.name}</h4>
                            </div>
                            <div class="item-price">₹${price}</div>
                            <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                    `;
                });
                
                cartContainer.innerHTML = `<div class="cart-items">${html}</div>`;
                
                const tax = Math.round(subtotal * 0.1);
                const total = subtotal + tax;
                
                document.getElementById('subtotal').textContent = '₹' + subtotal;
                document.getElementById('tax').textContent = '₹' + tax;
                document.getElementById('total').textContent = '₹' + total;
                document.getElementById('checkoutBtn').disabled = false;
            }
        }

        function removeFromCart(index) {
            fetch(`/api/cart/${index}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                showAlert('Item removed from cart', 'success');
                loadCart();
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Error removing item', 'error');
            });
        }

        function checkout() {
            if (cart.length === 0) {
                showAlert('Your cart is empty!', 'warning');
                return;
            }

            document.getElementById('checkoutBtn').disabled = true;
            document.getElementById('checkoutBtn').textContent = 'Processing...';

            fetch('/api/checkout', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'SUCCESS') {
                    const total = document.getElementById('total').textContent;
                    document.getElementById('orderId').textContent = `Transaction ID: ${data.order.payment_status}`;
                    document.getElementById('orderAmount').textContent = `Total Amount: ${total}`;
                    document.getElementById('successModal').classList.add('show');
                    document.getElementById('modalOverlay').classList.add('show');
                    cart = [];
                    updateCartDisplay();
                } else {
                    showAlert(data.message || 'Payment failed. Please try again.', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Checkout failed. Please try again.', 'error');
            })
            .finally(() => {
                document.getElementById('checkoutBtn').disabled = false;
                document.getElementById('checkoutBtn').textContent = 'Proceed to Checkout';
            });
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('show');
            document.getElementById('modalOverlay').classList.remove('show');
            loadProducts();
            loadCart();
        }

        function toggleCart() {
            // This can be used to toggle cart visibility on mobile
            alert('Cart items: ' + cart.length);
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert');
            alertBox.textContent = message;
            alertBox.className = 'alert ' + type;
            
            setTimeout(() => {
                alertBox.className = 'alert';
            }, 5000);
        }
    </script>
</body>
</html>
