steps:
 
# 🔹 1. Build Images with UNIQUE TAG
 
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/product-service:$SHORT_SHA', 'microservices/product-service']
 
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/cart-service:$SHORT_SHA', 'microservices/cart-service']
 
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/payment-service:$SHORT_SHA', 'microservices/payment-service']
 
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/ui-service:$SHORT_SHA', 'microservices/ui-service']
 
 
# 🔹 2A. Reserve Static Global IP (for Ingress)
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'compute'
    - 'addresses'
    - 'create'
    - 'ecommerce-ip'
    - '--global'
  onFailure: ['CONTINUE']  # Continue if IP already exists

# 🔹 2B. Get cluster credentials for kubectl
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'container'
    - 'clusters'
    - 'get-credentials'
    - '--project=citric-kit-489316-g6'
    - '--zone=us-central1-f'
    - 'kalaivani-gkecluster-1'

# 🔹 2C. Replace image tags inside k8s YAML (GitOps style)
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      sed -i "s|product-service:.*|product-service:$SHORT_SHA|g" k8s/product-deployment.yaml
      sed -i "s|cart-service:.*|cart-service:$SHORT_SHA|g" k8s/cart-deployment.yaml
      sed -i "s|payment-service:.*|payment-service:$SHORT_SHA|g" k8s/payment-deployment.yaml
      sed -i "s|ui-service:.*|ui-service:$SHORT_SHA|g" k8s/ui-deployment.yaml

 
 
# 🔹 3. Deploy to GKE using kubectl (AUTO AUTH via env)
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'k8s/']
  env:
    - 'CLOUDSDK_COMPUTE_ZONE=us-central1-f'
    - 'CLOUDSDK_CONTAINER_CLUSTER=kalaivani-gkecluster-1'
 
# 🔹 4. Push images to Artifact Registry
images:
- 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/product-service:$SHORT_SHA'
- 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/cart-service:$SHORT_SHA'
- 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/payment-service:$SHORT_SHA'
- 'asia-south1-docker.pkg.dev/citric-kit-489316-g6/kalaiartifactrepo15/ui-service:$SHORT_SHA'
 
 
# 🔹 5. Logging
options:
  logging: CLOUD_LOGGING_ONLY