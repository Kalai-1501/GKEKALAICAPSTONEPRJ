---
# 🌍 Google-Managed Certificate (GKE-native, auto-renews, no manual management)
# Requires DNS records pointing to Ingress IP before certificate issuance
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: ecommerce-managed-cert
spec:
  domains:
  - ecommerce.example.com
  - www.ecommerce.example.com
  - api.ecommerce.example.com

---
# 📋 Ingress Resource with routing rules and SSL/TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  annotations:
    # ✅ GKE-native Google-managed certificate (automatically renews)
    networking.gke.io/managed-certificates: "ecommerce-managed-cert"
    
    # ✅ Reserve a static global IP (must be created first)
    kubernetes.io/ingress.global-static-ip-name: "ecommerce-ip"
    
    # ✅ Redirect HTTP to HTTPS
    kubernetes.io/ingress.allow-http: "false"

spec:
  # Routing rules for microservices
  rules:
  
  # 🌐 Main UI Service
  - host: "ecommerce.example.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui-service
            port:
              number: 5000

  # 🌐 WWW variant
  - host: "www.ecommerce.example.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui-service
            port:
              number: 5000

  # 📦 Product Service API
  - host: "api.ecommerce.example.com"
    http:
      paths:
      - path: /products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 5001

  # 🛒 Cart Service API
      - path: /cart
        pathType: Prefix
        backend:
          service:
            name: cart-service
            port:
              number: 5002

  # 💳 Payment Service API
      - path: /checkout
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 5003

  # Health Check paths
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ui-service
            port:
              number: 5000

# 📝 END OF INGRESS CONFIGURATION
# 
# Configuration Notes:
# =====================================================================
# 
# 1. DNS SETUP (Before SSL cert generation):
#    Update your DNS to point domains to the Ingress IP:
#    ecommerce.example.com          -> EXTERNAL-IP
#    www.ecommerce.example.com      -> EXTERNAL-IP
#    api.ecommerce.example.com      -> EXTERNAL-IP
#
# 2. STATIC IP SETUP:
#    Reserve a static IP: gcloud compute addresses create ecommerce-ip --global
#    Then reference it in Ingress annotations (already configured)
#
# 3. MONITOR SSL CERT PROGRESS:
#    kubectl describe managedcertificate ecommerce-managed-cert
#    Wait for "Status: Active" before updating DNS TTL to minimum
#
# 4. VERIFY DEPLOYMENT:
#    kubectl get ingress ecommerce-ingress -w
#    kubectl get managedcertificate
#    kubectl describe ingress ecommerce-ingress
#
# 5. VERIFY SERVICES ARE REACHABLE:
#    - curl https://ecommerce.example.com
#    - curl https://api.ecommerce.example.com/products
#    - curl https://api.ecommerce.example.com/cart
#    - curl https://api.ecommerce.example.com/checkout
#
# ADVANCED PRODUCTION CONFIGURATION (Not included to avoid errors):
# =====================================================================
# Optional: Add BackendConfig for CDN/session affinity
# Optional: Add ComputeSSLPolicy for TLS version control (requires Config Connector)
# Optional: Add NetworkPolicy for network segmentation
# Optional: Add HPA (Horizontal Pod Autoscaler) for auto-scaling
